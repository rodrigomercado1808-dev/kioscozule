<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiosco Pro</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
</head>
<body>
    <div id="loader" class="loader hidden"><div class="spinner"></div></div>
    <div id="toast-container"></div>

    <header>
        <div class="container header-flex">
                <h1>Kiosco <span>Pro</span></h1>
                <button id="btn-menu" class="hamburger" aria-label="Abrir menú">☰</button>
                <nav id="main-nav" class="main-nav">
                    <button id="btn-ventas" class="nav-btn active">Ventas</button>
                    <button id="btn-inventario" class="nav-btn">Inventario</button>
                    <button id="btn-backups" class="nav-btn">Backups</button>
                </nav>
        </div>
    </header>

    <main class="container">
        <div id="firebase-error" class="card error-card hidden"></div>

        <section id="section-ventas">
            <div class="action-bar">
                <div class="search-box">
                    <i data-lucide="search"></i>
                    <input type="text" id="search-venta" placeholder="Nombre, código o precio...">
                        <div id="search-results" class="search-results hidden" aria-live="polite"></div>
                </div>
                <button id="btn-manual-add" class="btn-secondary" title="Agregar manualmente"><i data-lucide="plus"></i></button>
                <button id="btn-scan-venta" class="btn-primary" title="Escanear"><i data-lucide="camera"></i></button>
            </div>
            <div class="cart-container card">
                <div class="cart-header">
                    <h2>Carrito</h2>
                    <button id="btn-clear-cart" class="btn-text">Vaciar</button>
                </div>
                <div id="cart-items" class="cart-list"><div class="empty-state">Carrito vacío</div></div>
                <div class="cart-summary">
                    <div class="summary-row"><span>Total:</span><span id="cart-total" class="total-price">$0.00</span></div>
                    <button id="btn-checkout" class="btn-success btn-block" disabled>Confirmar Venta</button>
                </div>
            </div>
        </section>

        <section id="section-inventario" class="hidden">
            <div class="action-bar">
                <div class="search-box">
                    <i data-lucide="search"></i>
                    <input type="text" id="search-inventario" placeholder="Filtrar productos...">
                </div>
                <button id="btn-add-product" class="btn-primary"><i data-lucide="plus"></i></button>
                <button id="btn-backup-manual" class="btn-secondary"><i data-lucide="download"></i> Backup</button>
            </div>
            <div id="inventory-list" class="card-grid"></div>
        </section>

        <section id="section-backups" class="hidden">
            <h2>Historial de Backups</h2>
            <button id="btn-restore" class="btn-secondary"><i data-lucide="upload"></i> Restaurar desde JSON</button>
            <input type="file" id="file-restore" accept=".json" class="hidden">
            <div id="backup-history" class="card-list"></div>
        </section>
    </main>

    <div id="modal-product" class="modal hidden">

        <div id="modal-scan-confirm" class="modal hidden">
            <div class="modal-content card">
                <h3 id="scan-modal-title">Producto escaneado</h3>
                <div id="scan-modal-body"></div>
                <div class="modal-actions">
                    <button type="button" id="scan-modal-cancel" class="btn-secondary">Cancelar</button>
                    <button type="button" id="scan-modal-add" class="btn-primary">Agregar al carrito</button>
                    <button type="button" id="scan-modal-create" class="btn-icon hidden">Crear producto</button>
                </div>
            </div>
        </div>
        <div class="modal-content card">
            <h3 id="modal-title">Producto</h3>
            <form id="form-product">
                <input type="hidden" id="prod-id">
                <div class="form-group">
                    <label>Código de Barras *</label>
                    <div class="input-with-action">
                        <input type="text" id="prod-code" required>
                        <button type="button" id="btn-scan-modal" class="btn-icon"><i data-lucide="camera"></i></button>
                    </div>
                </div>
                <div class="form-group"><label>Nombre *</label><input type="text" id="prod-name" required></div>
                <div class="form-row">
                    <div class="form-group"><label>Precio ($) *</label><input type="number" id="prod-price" step="0.01" min="0" required></div>
                    <div class="form-group"><label>Stock *</label><input type="number" id="prod-stock" min="0" required></div>
                </div>
                <div class="modal-actions">
                    <button type="button" id="btn-cancel" class="btn-secondary">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
    <div id="modal-quick-add" class="modal hidden">
        <div class="modal-content card">
            <h3>Agregar producto</h3>
            <div class="form-group">
                <label>Buscar producto</label>
                <input type="text" id="quick-search" placeholder="Buscar por nombre o código...">
            </div>
            <div id="quick-product-list" class="quick-list"></div>
            <div class="modal-actions">
                <button type="button" id="quick-cancel" class="btn-secondary">Cerrar</button>
            </div>
        </div>
    </div>

    <div id="camera-overlay" class="modal hidden">
        <div class="camera-container">
            <div id="interactive" class="viewport"></div>
            <button id="btn-close-camera" class="btn-close">&times;</button>
            <div class="scan-guide">Escaneando...</div>
        </div>
    </div>

    <footer><p>&copy; 2026 | Con ❤️ para mamá</p></footer>
    <script type="module" src="firebase.js"></script>
    <script type="module" src="app.js"></script>
    <script> lucide.createIcons(); </script>
</body>
</html>
